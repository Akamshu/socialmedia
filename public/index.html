<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Media Analyzer</title>
  <link rel="stylesheet" href="css/style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            border: 'hsl(240 5.9% 90%)',
            input: 'hsl(240 5.9% 90%)',
            ring: 'hsl(240 5.9% 10%)',
            background: 'hsl(240 4.8% 95.9% / 0.5)', /* Light grey backing like Shadcn docs */
            foreground: 'hsl(240 10% 3.9%)',
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(240 10% 3.9%)'
            },
            primary: {
              DEFAULT: 'hsl(240 5.9% 10%)',
              foreground: 'hsl(0 0% 98%)',
            },
            muted: {
              DEFAULT: 'hsl(240 4.8% 95.9%)',
              foreground: 'hsl(240 3.8% 46.1%)',
            },
          },
          borderRadius: {
            lg: '0.5rem',
            md: 'calc(0.5rem - 2px)',
            sm: 'calc(0.5rem - 4px)',
          },
        },
      },
    }
  </script>

  <style>
    body {
      font-feature-settings: "cv02", "cv03", "cv04", "cv11";
    }
  </style>
</head>

<body class="bg-[#fcfcfc] text-foreground antialiased min-h-screen flex items-center justify-center p-4 md:p-8">
<div class="particles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

  <div id="welcomeModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-opacity duration-300 opacity-100">
    <div class="bg-white rounded-2xl max-w-sm w-full border border-zinc-100 shadow-2xl overflow-hidden transform scale-100 transition-transform duration-300">
      <div class="h-2 bg-gradient-to-r from-red-600 via-red-500 to-orange-500"></div>
      
      <div class="p-6 text-center">
        <div class="w-12 h-12 mx-auto rounded-full bg-red-50 text-red-600 flex items-center justify-center mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 21l8.904-4.473L21 9l-3.343-3.343-7.844 10.247zm0 0l2.354 2.354M12 4v1M18 4v1M6 4v1M4 12H3M4 18H3M4 6H3" />
          </svg>
        </div>

        <h3 class="text-xl font-bold text-zinc-900">Welcome</h3>
        <p class="text-zinc-500 mt-2 text-sm">
          Designed by <span class="font-semibold text-zinc-800">JOHN UCHECHE (ST/SWD/HND/24/025)</span>
        </p>

        <button 
          onclick="closeModal()" 
          class="mt-6 w-full py-2.5 px-4 bg-zinc-900 hover:bg-zinc-800 text-white font-medium rounded-xl transition shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-zinc-900">
          Get Started
        </button>
      </div>
    </div>
  </div>

  <div class="main-card w-full max-w-5xl overflow-hidden rounded-3xl border border-white/40 bg-white/80 backdrop-blur-xl shadow-2xl">

    <div class="bg-gradient-to-r from-red-600 via-red-500 to-orange-500 px-8 py-8 text-white">

        <div class="flex items-center gap-4">

            <div class="w-14 h-14 rounded-2xl bg-white/20 flex items-center justify-center backdrop-blur">

                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8.051 1.999h-.003C3.5 2 1 2.3 1 8s2.5 6 7.048 6h.003C12.5 14 15 13.7 15 8s-2.5-6-6.949-6.001zM6.5 10.5v-5l4 2.5-4 2.5z"/>
                </svg>

            </div>

            <div>

                <h1 class="text-4xl font-bold">
                    Social Media Analyzer
                </h1>

                <p class="text-red-100 mt-1">
                    Discover the highest-performing YouTube videos using AI-powered analytics.
                </p>

            </div>

        </div>

    </div>

    <div class="p-8">

        <div class="flex flex-col md:flex-row gap-4">

            <div class="relative flex-1">

                <svg xmlns="http://www.w3.org/2000/svg"
                     class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400"
                     width="18"
                     height="18"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="2"
                     viewBox="0 0 24 24">

                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>

                </svg>

                <input
                    id="keyword"
                    type="text"
                    placeholder="Search YouTube videos..."
                    class="w-full h-14 rounded-xl border border-zinc-200 bg-white pl-12 pr-4 text-base shadow-sm focus:ring-4 focus:ring-red-200 focus:border-red-500 transition"/>

            </div>

            <button
                onclick="analyze()"
                class="h-14 px-8 rounded-xl bg-gradient-to-r from-red-600 to-orange-500 text-white font-semibold shadow-lg hover:scale-105 hover:shadow-xl transition">

                Analyze

            </button>

        </div>

        <p class="mt-4 text-sm text-zinc-500">

            Popular searches:

            <span class="font-semibold text-red-600">MrBeast</span> •

            <span class="font-semibold text-red-600">AI</span> •

            <span class="font-semibold text-red-600">Football</span> •

            <span class="font-semibold text-red-600">Technology</span>

        </p>

        <div id="loading"
             class="hidden items-center justify-center gap-3 py-10">

            <div class="w-8 h-8 border-4 border-red-200 border-t-red-600 rounded-full animate-spin"></div>

            <span class="text-zinc-600 font-medium">

                Analyzing YouTube videos...

            </span>

        </div>

        <div
            id="results"
            class="mt-8 rounded-2xl border border-zinc-100 bg-zinc-50 p-6 space-y-6">

        </div>

    </div>

    <div class="border-t border-zinc-100 bg-zinc-50 px-8 py-4 flex justify-between text-sm text-zinc-500">

        <span>

            © 2026 Social Media Analyzer

        </span>

        <span>

            Powered by YouTube Data API

        </span>

    </div>

</div>

  <script src="js/script.js"></script>
  
  <script>
    function closeModal() {
      const modal = document.getElementById('welcomeModal');
      // Fade out transition
      modal.classList.add('opacity-0', 'pointer-events-none');
      setTimeout(() => {
        modal.remove(); // Completely clear from DOM after transition
      }, 300);
    }
  </script>
</body>
</html>
